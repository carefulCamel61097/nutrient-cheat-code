<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nutrient Cheat Code</title>
  <style>
    :root {
      --bg: #0e1116;
      --panel: #1a1b1e;
      --border: #2a2c33;
      --text: #e6e6e6;
      --dim: #8a8f98;
      --mono: ui-monospace, "JetBrains Mono", "IBM Plex Mono", "Consolas", monospace;
      --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --accent: #4ec9d6;
      --bar-under: #a14545;
      --bar-near: #c9a227;
      --bar-good: #3fa34d;
      --bar-over: #d63b3b;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--text);
      font-family: var(--sans); font-size: 14px;
    }
    body { padding: 20px; max-width: 1200px; margin: 0 auto; }

    header {
      display: flex; align-items: baseline; justify-content: space-between;
      padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 16px;
      flex-wrap: wrap; gap: 8px;
    }
    h1 {
      margin: 0; font-size: 14px; font-weight: 600; letter-spacing: 0.2em;
      color: var(--text); text-transform: uppercase;
    }
    .totals { font-family: var(--mono); color: var(--dim); font-size: 13px; }
    .totals .num { color: var(--text); }
    .totals .sep { margin: 0 8px; opacity: 0.4; }

    .view-toggle {
      display: flex; margin-bottom: 20px;
      border: 1px solid var(--border); border-radius: 4px; width: fit-content;
      overflow: hidden;
    }
    .view-toggle button {
      background: transparent; color: var(--dim); border: none;
      padding: 6px 14px; font-family: var(--sans); font-size: 11px; cursor: pointer;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .view-toggle button.active { background: var(--panel); color: var(--text); }
    .view-toggle button:hover:not(.active) { color: var(--text); }

    main {
      display: grid; grid-template-columns: minmax(260px, 1fr) minmax(320px, 1.4fr);
      gap: 20px;
    }
    @media (max-width: 760px) {
      main { grid-template-columns: 1fr; }
      #bars-section { position: static; max-height: none; overflow: visible; }
    }

    section {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 4px; padding: 14px 16px;
    }
    #bars-section {
      position: sticky; top: 20px;
      align-self: start;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
    }
    section h2 {
      margin: 0 0 12px 0; font-size: 10px; font-weight: 600; letter-spacing: 0.18em;
      color: var(--dim); text-transform: uppercase;
    }

    /* --- BASELINE SECTION --- */
    .baseline {
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .baseline-label {
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: 10px; letter-spacing: 0.14em; color: var(--dim);
      text-transform: uppercase; margin-bottom: 6px;
      padding-bottom: 4px; border-bottom: 1px solid var(--border);
    }
    .check-all-btn {
      cursor: pointer; color: var(--accent); font-size: 10px;
      letter-spacing: 0.06em; text-transform: lowercase;
      user-select: none; font-weight: normal;
    }
    .check-all-btn:hover { text-decoration: underline; }
    .baseline-picker {
      width: 100%;
      background: var(--bg); color: var(--dim);
      border: 1px dashed var(--border);
      font-family: var(--mono); font-size: 11.5px;
      padding: 6px 8px; border-radius: 3px; cursor: pointer;
      margin-top: 8px;
    }
    .baseline-picker:hover { color: var(--text); border-style: solid; }
    .baseline-row {
      display: grid; grid-template-columns: 18px 1fr auto 22px;
      align-items: center; gap: 10px; padding: 5px 0;
      font-family: var(--mono); font-size: 12.5px;
    }
    .baseline-row.unchecked .food-name, .baseline-row.unchecked select { opacity: 0.55; }
    .baseline-row .remove-btn {
      cursor: pointer; color: var(--dim); font-size: 14px; line-height: 1;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 3px;
      user-select: none;
    }
    .baseline-row .remove-btn:hover {
      color: var(--bar-over);
      background: rgba(255,255,255,0.06);
    }

    /* --- CLUSTER FOODS --- */
    .cluster { margin-bottom: 14px; }
    .cluster:last-child { margin-bottom: 0; }
    .cluster-label {
      font-size: 10px; letter-spacing: 0.14em; color: var(--dim);
      text-transform: uppercase; margin-bottom: 4px;
      padding-bottom: 4px; border-bottom: 1px solid var(--border);
    }
    .food {
      display: grid; grid-template-columns: 18px 1fr auto;
      align-items: center; gap: 10px; padding: 5px 0;
      font-family: var(--mono); font-size: 12.5px;
    }
    .food input[type="checkbox"], .baseline-row input[type="checkbox"] {
      accent-color: var(--accent); cursor: pointer; margin: 0;
    }
    .food.unchecked .food-name, .food.unchecked select { opacity: 0.55; }
    .food.hover-preview, .baseline-row.hover-preview {
      background: rgba(78, 201, 214, 0.08);
    }
    .specialty {
      color: var(--dim); font-size: 11px; font-weight: normal;
      margin-left: 4px;
    }

    /* --- NUTRIENT TOOLTIP (top foods for nutrient on bar hover) --- */
    .nutrient-tooltip {
      position: fixed;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 10px;
      font-family: var(--mono);
      font-size: 11px;
      z-index: 100;
      pointer-events: none;
      display: none;
      min-width: 220px; max-width: 320px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    .nutrient-tooltip.visible { display: block; }
    .nutrient-tooltip .tt-title {
      color: var(--dim); font-size: 9.5px;
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-bottom: 6px; padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .nutrient-tooltip .tt-row {
      display: grid; grid-template-columns: 1fr auto;
      gap: 12px; padding: 2px 0;
    }
    .nutrient-tooltip .tt-row .tt-name { color: var(--text); }
    .nutrient-tooltip .tt-row .tt-val { color: var(--dim); white-space: nowrap; }

    /* --- SCROLLBAR (sticky bars panel) --- */
    #bars-section::-webkit-scrollbar { width: 8px; }
    #bars-section::-webkit-scrollbar-track { background: var(--bg); }
    #bars-section::-webkit-scrollbar-thumb {
      background: var(--border); border-radius: 4px;
    }
    #bars-section::-webkit-scrollbar-thumb:hover { background: var(--dim); }
    #bars-section { scrollbar-color: var(--border) var(--bg); scrollbar-width: thin; }
    .food select, .baseline-row select {
      background: var(--bg); color: var(--text); border: 1px solid var(--border);
      font-family: var(--mono); font-size: 11.5px; padding: 2px 6px; border-radius: 3px;
      cursor: pointer;
    }

    /* --- BARS --- */
    .bar-row {
      display: grid; grid-template-columns: 26px 110px 1fr 56px;
      align-items: center; gap: 10px; padding: 4px 0; font-size: 12px;
    }
    .bar-row.untracked { opacity: 0.4; }
    .bar-track-toggle {
      cursor: pointer; color: var(--accent); font-size: 16px;
      user-select: none; line-height: 1;
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
    }
    .bar-row.untracked .bar-track-toggle { color: var(--dim); }
    .bar-track-toggle:hover { background: rgba(255,255,255,0.06); color: var(--text); }
    .bar-label { color: var(--text); font-size: 12px; }
    .bar-track {
      position: relative; height: 8px; background: var(--bg); border-radius: 1px;
      border: 1px solid var(--border); overflow: visible;
    }
    .bar-fill {
      position: absolute; top: 0; left: 0; bottom: 0;
      transition: width 0.15s ease, background-color 0.15s ease;
    }
    .bar-tick {
      position: absolute; top: -3px; bottom: -3px; width: 1px;
      background: var(--dim);
      transform: translateX(-50%);
    }
    .bar-tick.ul {
      background: var(--bar-over); width: 2px;
      top: -4px; bottom: -4px;
    }
    .bar-pct {
      font-family: var(--mono); color: var(--text);
      text-align: right; font-size: 11px;
    }
    .untracked-divider {
      grid-column: 1 / -1; margin: 12px 0 6px; padding-top: 8px;
      border-top: 1px dashed var(--border); font-size: 9.5px;
      letter-spacing: 0.16em; color: var(--dim); text-transform: uppercase;
    }

    .legend {
      margin-top: 14px; padding-top: 10px; border-top: 1px solid var(--border);
      font-family: var(--mono); font-size: 10.5px; color: var(--dim);
      display: flex; flex-wrap: wrap; gap: 14px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-swatch { width: 8px; height: 8px; border-radius: 1px; }
  </style>
</head>

  // ============================================================
  //  STATE
  // ============================================================

  const STATE_KEY = 'nutrient-cheat-code-v1';

  function loadState() {
    const blank = { selections: {}, untracked: [], view: 'common', baselineFoods: [] };
    const validViews = ['common', 'all'];
    try {
      const saved = JSON.parse(localStorage.getItem(STATE_KEY) || '{}');
      return {
        ...blank,
        ...saved,
        selections: { ...blank.selections, ...(saved.selections || {}) },
        baselineFoods: Array.isArray(saved.baselineFoods) ? saved.baselineFoods : [],
        view: validViews.includes(saved.view) ? saved.view : blank.view,
      };
    } catch {
      return blank;
    }
  }
  function saveState() {
    localStorage.setItem(STATE_KEY, JSON.stringify(state));
  }

  let state = loadState();
  let hoveredFoodId = null; // runtime-only; not persisted

  // ============================================================
  //  COMPUTE
  // ============================================================

  function computeTotals() {
    if (hoveredFoodId) {
      const food = FOODS.find(f => f.id === hoveredFoodId);
      if (food) return computeTotalsForFood(food);
    }
    const totals = { calories: 0, grams: 0 };
    NUTRIENTS.forEach(n => totals[n.id] = 0);

    FOODS.forEach(food => {
      const portionIdx = state.selections[food.id];
      if (portionIdx == null) return;
      const safeIdx = (portionIdx >= 0 && portionIdx < food.portions.length) ? portionIdx : food.defaultPortion;
      const grams = food.portions[safeIdx][1];
      const factor = grams / 100;
      if (!food.hideGrams) totals.grams += grams;
      totals.calories += (food.per100g.calories || 0) * factor;
      NUTRIENTS.forEach(n => {
        totals[n.id] += (food.per100g[n.id] || 0) * factor;
      });
    });
    return totals;
  }

  // Single-food totals — used when hovering a food row to preview its contribution alone.
  function computeTotalsForFood(food) {
    const totals = { calories: 0, grams: 0 };
    NUTRIENTS.forEach(n => totals[n.id] = 0);
    const rawIdx = state.selections[food.id];
    const portionIdx = (rawIdx == null) ? food.defaultPortion : rawIdx;
    const safeIdx = (portionIdx >= 0 && portionIdx < food.portions.length) ? portionIdx : food.defaultPortion;
    const grams = food.portions[safeIdx][1];
    const factor = grams / 100;
    totals.grams = food.hideGrams ? 0 : grams;
    totals.calories = (food.per100g.calories || 0) * factor;
    NUTRIENTS.forEach(n => {
      totals[n.id] = (food.per100g[n.id] || 0) * factor;
    });
    return totals;
  }

  function pctOfDV(nutrientId, totals) {
    const n = NUTRIENTS.find(x => x.id === nutrientId);
    if (!n || !n.dv) return 0;
    return (totals[nutrientId] / n.dv) * 100;
  }

  // Returns a short label for a nutrient (e.g., "Vit C", "B12", "Selenium").
  function shortLabel(label) {
    return label
      .replace(/Vitamin (B\d+)/, '$1')   // "Vitamin B12" → "B12"
      .replace('Vitamin ', 'Vit ')       // "Vitamin C" → "Vit C"
      .replace(/ \([^)]+\)/, '');        // "Folate (B9)" → "Folate"
  }

  // Returns the food's "specialty" tags — nutrients hitting ≥40% DV at default
  // portion, sorted by descending coverage, capped at 3. Used to render hints
  // next to food names like "Kale (Vit K)" or "Beef liver (B12, Vit A)".
  // Threshold matches the bar color-coding (40% = amber threshold).
  const SPECIALTY_THRESHOLD = 40;
  const SPECIALTY_MAX = 3;
  function specialtyTags(food) {
    const portion = food.portions[food.defaultPortion];
    if (!portion) return [];
    const factor = portion[1] / 100;
    const tagged = [];
    for (const n of NUTRIENTS) {
      if (!n.dv) continue;
      const pct = ((food.per100g[n.id] || 0) * factor / n.dv) * 100;
      if (pct >= SPECIALTY_THRESHOLD) {
        tagged.push({ label: shortLabel(n.label), pct });
      }
    }
    tagged.sort((a, b) => b.pct - a.pct);
    return tagged.slice(0, SPECIALTY_MAX);
  }

  // Returns top N foods by % DV at default portion, descending.
  // Used by the bar-label hover tooltip ("show me where this nutrient comes from
  // and how much I'd actually get from a typical serving").
  function topFoodsByPctDV(nutrientId, n = 5) {
    const nut = NUTRIENTS.find(x => x.id === nutrientId);
    if (!nut || !nut.dv) return [];
    return FOODS
      .map(f => {
        const portion = f.portions[f.defaultPortion];
        if (!portion) return null;
        const factor = portion[1] / 100;
        const value = (f.per100g[nutrientId] || 0) * factor;
        const pct = (value / nut.dv) * 100;
        return { food: f, portion, value, pct };
      })
      .filter(x => x && x.value > 0)
      .sort((a, b) => b.pct - a.pct)
      .slice(0, n);
  }

  function colorForPct(pct, ulPct) {
    if (ulPct != null && pct > ulPct) return 'var(--bar-over)';
    if (pct >= 80) return 'var(--bar-good)';
    if (pct >= 40) return 'var(--bar-near)';
    return 'var(--bar-under)';
  }

  // Map a "% of DV" value to a position on the bar track (0–100; >100 overflows).
  // DV always sits at 60% of the track for visual consistency across all nutrients.
  // UL nutrients: track right edge (100%) = UL.
  // Non-UL nutrients: track right edge = 200% DV (arbitrary safe headroom).
  function pctToTrackPos(pct, ulPct) {
    if (pct <= 100) return (pct / 100) * 60;
    const headroomPct = ulPct ?? 200;
    return 60 + ((pct - 100) / (headroomPct - 100)) * 40;
  }

  // ============================================================
  //  RENDER
  // ============================================================

  function render() {
    renderFoods();
    renderTotals();
    renderBars();
    renderViewToggle();
  }

  // Attach preview hover to a specific trigger element (typically the food name)
  // so checkbox/dropdown interaction doesn't fire the preview. The row still gets
  // the visual highlight so the user can see which food is being previewed.
  function showNutrientTooltip(nutrient, anchorEl) {
    const tooltip = document.getElementById('nutrient-tooltip');
    const top = topFoodsByPctDV(nutrient.id, 5);
    if (top.length === 0) { hideNutrientTooltip(); return; }
    tooltip.innerHTML = '';

    const title = document.createElement('div');
    title.className = 'tt-title';
    title.textContent = `Top ${nutrient.label} sources (default portion)`;
    tooltip.appendChild(title);

    for (const item of top) {
      const row = document.createElement('div');
      row.className = 'tt-row';
      const name = document.createElement('span');
      name.className = 'tt-name';
      const portionLabel = item.food.hideGrams
        ? item.portion[0]
        : `${item.portion[1]}g`;
      name.textContent = `${item.food.name} (${portionLabel})`;
      const val = document.createElement('span');
      val.className = 'tt-val';
      val.textContent = `${Math.round(item.pct)}%`;
      row.appendChild(name);
      row.appendChild(val);
      tooltip.appendChild(row);
    }

    // Position fixed, just below the anchor row, clamped to the viewport.
    const rect = anchorEl.getBoundingClientRect();
    tooltip.classList.add('visible');
    const tipRect = tooltip.getBoundingClientRect();
    let top_ = rect.bottom + 4;
    let left = Math.max(8, rect.left);
    if (left + tipRect.width > window.innerWidth - 8) {
      left = window.innerWidth - tipRect.width - 8;
    }
    if (top_ + tipRect.height > window.innerHeight - 8) {
      top_ = Math.max(8, rect.top - tipRect.height - 4);
    }
    tooltip.style.top = `${top_}px`;
    tooltip.style.left = `${left}px`;
  }

  function hideNutrientTooltip() {
    document.getElementById('nutrient-tooltip').classList.remove('visible');
  }

  function attachHoverPreview(trigger, row, food) {
    trigger.addEventListener('mouseenter', () => {
      hoveredFoodId = food.id;
      row.classList.add('hover-preview');
      renderTotals();
      renderBars();
    });
    trigger.addEventListener('mouseleave', () => {
      hoveredFoodId = null;
      row.classList.remove('hover-preview');
      renderTotals();
      renderBars();
    });
  }

  function renderFoods() {
    const container = document.getElementById('foods');
    container.innerHTML = '';
    renderBaseline(container);
    renderClusters(container);
  }

  // ----- BASELINE -----

  function renderBaseline(container) {
    const wrap = document.createElement('div');
    wrap.className = 'baseline';

    const heading = document.createElement('div');
    heading.className = 'baseline-label';

    const title = document.createElement('span');
    title.textContent = 'Daily baseline';
    heading.appendChild(title);

    if (state.baselineFoods.length > 0) {
      const allChecked = state.baselineFoods.every(id => state.selections[id] != null);
      const toggle = document.createElement('span');
      toggle.className = 'check-all-btn';
      toggle.textContent = allChecked ? 'uncheck all' : 'check all';
      toggle.addEventListener('click', () => {
        state.baselineFoods.forEach(id => {
          if (allChecked) {
            state.selections[id] = null;
          } else {
            const food = FOODS.find(f => f.id === id);
            if (food) state.selections[id] = food.defaultPortion;
          }
        });
        saveState();
        render();
      });
      heading.appendChild(toggle);
    }
    wrap.appendChild(heading);

    state.baselineFoods.forEach(foodId => {
      const food = FOODS.find(f => f.id === foodId);
      if (!food) return;
      wrap.appendChild(makeBaselineRow(food));
    });

    wrap.appendChild(makeBaselinePicker());
    container.appendChild(wrap);
  }

  function makeBaselinePicker() {
    const picker = document.createElement('select');
    picker.className = 'baseline-picker';
    const placeholder = document.createElement('option');
    placeholder.value = '';
    placeholder.textContent = '+ add a daily food…';
    picker.appendChild(placeholder);
    FOODS.filter(f => f.category === 'common' && !state.baselineFoods.includes(f.id))
      .forEach(food => {
        const opt = document.createElement('option');
        opt.value = food.id;
        opt.textContent = food.name;
        picker.appendChild(opt);
      });
    picker.addEventListener('change', () => {
      if (!picker.value) return;
      addBaselineFood(picker.value);
    });
    return picker;
  }

  function addBaselineFood(foodId) {
    const food = FOODS.find(f => f.id === foodId);
    if (!food || state.baselineFoods.includes(foodId)) return;
    state.baselineFoods.push(foodId);
    state.selections[foodId] = food.defaultPortion;
    saveState();
    render();
  }

  function removeBaselineFood(foodId) {
    state.baselineFoods = state.baselineFoods.filter(id => id !== foodId);
    state.selections[foodId] = null;
    saveState();
    render();
  }

  function makeBaselineRow(food) {
    const checked = state.selections[food.id] != null;
    const portionIdx = checked ? state.selections[food.id] : food.defaultPortion;

    const row = document.createElement('div');
    row.className = 'baseline-row' + (checked ? '' : ' unchecked');

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = checked;
    cb.addEventListener('change', () => {
      state.selections[food.id] = cb.checked ? food.defaultPortion : null;
      saveState();
      render();
    });

    const name = document.createElement('span');
    name.className = 'food-name';
    name.textContent = food.name;
    const tags = specialtyTags(food);
    if (tags.length > 0) {
      const tagEl = document.createElement('span');
      tagEl.className = 'specialty';
      tagEl.textContent = `(${tags.map(t => t.label).join(', ')})`;
      name.appendChild(tagEl);
    }
    attachHoverPreview(name, row, food);

    const sel = document.createElement('select');
    food.portions.forEach(([label, g], i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = food.hideGrams ? label : (label.includes('(') ? label : `${label} (${g}g)`);
      if (i === portionIdx) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', () => {
      state.selections[food.id] = parseInt(sel.value, 10);
      saveState();
      render();
    });

    const removeBtn = document.createElement('span');
    removeBtn.className = 'remove-btn';
    removeBtn.textContent = '×';
    removeBtn.title = 'Remove from baseline';
    removeBtn.addEventListener('click', () => removeBaselineFood(food.id));

    row.appendChild(cb);
    row.appendChild(name);
    row.appendChild(sel);
    row.appendChild(removeBtn);
    return row;
  }

  // ----- CLUSTERS -----

  function renderClusters(container) {
    CLUSTERS.forEach(cluster => {
      const clusterFoods = FOODS.filter(f => f.category === 'cluster' && f.cluster === cluster.id);
      if (clusterFoods.length === 0) return;

      const wrap = document.createElement('div');
      wrap.className = 'cluster';
      const heading = document.createElement('div');
      heading.className = 'cluster-label';
      heading.textContent = cluster.label;
      wrap.appendChild(heading);

      clusterFoods.forEach(food => wrap.appendChild(makeClusterRow(food)));
      container.appendChild(wrap);
    });
  }

  function makeClusterRow(food) {
    const checked = state.selections[food.id] != null;
    const portionIdx = checked ? state.selections[food.id] : food.defaultPortion;

    const row = document.createElement('div');
    row.className = 'food' + (checked ? '' : ' unchecked');

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = checked;
    cb.addEventListener('change', () => {
      state.selections[food.id] = cb.checked ? food.defaultPortion : null;
      saveState();
      render();
    });

    const name = document.createElement('span');
    name.className = 'food-name';
    name.textContent = food.name;
    const tags = specialtyTags(food);
    if (tags.length > 0) {
      const tagEl = document.createElement('span');
      tagEl.className = 'specialty';
      tagEl.textContent = `(${tags.map(t => t.label).join(', ')})`;
      name.appendChild(tagEl);
    }
    attachHoverPreview(name, row, food);

    const sel = document.createElement('select');
    food.portions.forEach(([label, g], i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = food.hideGrams ? label : (label.includes('(') ? label : `${label} (${g}g)`);
      if (i === portionIdx) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', () => {
      state.selections[food.id] = parseInt(sel.value, 10);
      saveState();
      render();
    });

    row.appendChild(cb);
    row.appendChild(name);
    row.appendChild(sel);
    return row;
  }

  // ----- TOTALS / BARS -----

  function renderTotals() {
    const totals = computeTotals();
    document.getElementById('total-cal').textContent = Math.round(totals.calories);
    document.getElementById('total-g').textContent = Math.round(totals.grams);
  }

  function renderViewToggle() {
    document.querySelectorAll('#view-toggle button').forEach(b =>
      b.classList.toggle('active', b.dataset.view === state.view)
    );
  }

  function renderBars() {
    const container = document.getElementById('bars');
    const heading = document.getElementById('bars-heading');
    container.innerHTML = '';
    const totals = computeTotals();
    const visible = state.view === 'common' ? NUTRIENTS.filter(n => n.gap) : NUTRIENTS;

    if (hoveredFoodId) {
      const food = FOODS.find(f => f.id === hoveredFoodId);
      if (food) {
        const rawIdx = state.selections[food.id];
        const idx = (rawIdx == null) ? food.defaultPortion : rawIdx;
        const portion = food.portions[idx] || food.portions[food.defaultPortion];
        const portionDesc = food.hideGrams ? portion[0] : `${portion[1]}g`;
        heading.textContent = `Preview · ${food.name} (${portionDesc})`;
      } else {
        heading.textContent = 'Preview';
      }
    } else if (state.view === 'common') {
      heading.textContent = `Common gaps · ${visible.length} of ${NUTRIENTS.length}`;
    } else {
      heading.textContent = `All nutrients · ${NUTRIENTS.length}`;
    }
    renderNutrientBars(container, totals, visible);
  }

  function renderNutrientBars(container, totals, visibleNutrients) {
    const tracked = visibleNutrients.filter(n => !state.untracked.includes(n.id));
    const untracked = visibleNutrients.filter(n => state.untracked.includes(n.id));

    tracked.forEach(n => container.appendChild(makeNutrientBar(n, totals, false)));

    if (untracked.length > 0) {
      const sep = document.createElement('div');
      sep.className = 'untracked-divider';
      sep.textContent = 'Untracked';
      container.appendChild(sep);
      untracked.forEach(n => container.appendChild(makeNutrientBar(n, totals, true)));
    }
  }

  function makeNutrientBar(nutrient, totals, isUntracked) {
    const pct = pctOfDV(nutrient.id, totals);
    const ulPct = nutrient.ul ? (nutrient.ul / nutrient.dv) * 100 : null;
    const trackPos = pctToTrackPos(pct, ulPct);
    const fillWidth = Math.min(100, trackPos);
    const dvTickPos = 60;
    const ulTickPos = ulPct != null ? 100 : null;
    const color = colorForPct(pct, ulPct);

    const row = document.createElement('div');
    row.className = 'bar-row' + (isUntracked ? ' untracked' : '');

    const toggle = document.createElement('div');
    toggle.className = 'bar-track-toggle';
    toggle.textContent = isUntracked ? '○' : '●';
    toggle.title = isUntracked ? 'Track this nutrient' : 'Untrack this nutrient';
    toggle.addEventListener('click', () => {
      if (isUntracked) {
        state.untracked = state.untracked.filter(id => id !== nutrient.id);
      } else {
        state.untracked.push(nutrient.id);
      }
      saveState();
      renderBars();
    });

    const label = document.createElement('div');
    label.className = 'bar-label';
    label.textContent = nutrient.label;
    label.addEventListener('mouseenter', () => showNutrientTooltip(nutrient, label));
    label.addEventListener('mouseleave', hideNutrientTooltip);

    const track = document.createElement('div');
    track.className = 'bar-track';
    const fill = document.createElement('div');
    fill.className = 'bar-fill';
    fill.style.width = fillWidth + '%';
    fill.style.background = color;
    track.appendChild(fill);
    const dvTick = document.createElement('div');
    dvTick.className = 'bar-tick';
    dvTick.style.left = dvTickPos + '%';
    track.appendChild(dvTick);
    if (ulTickPos != null) {
      const ulTick = document.createElement('div');
      ulTick.className = 'bar-tick ul';
      ulTick.style.left = ulTickPos + '%';
      track.appendChild(ulTick);
    }

    const pctEl = document.createElement('div');
    pctEl.className = 'bar-pct';
    pctEl.textContent = Math.round(pct) + '%';

    row.appendChild(toggle);
    row.appendChild(label);
    row.appendChild(track);
    row.appendChild(pctEl);
    return row;
  }

  function renderClusterBars(container, totals) {
    CLUSTERS.forEach(cluster => {
      const primary = cluster.primary.filter(id => !state.untracked.includes(id));
      if (primary.length === 0) return;
      // Cap each primary nutrient at 100% before averaging — a cluster is "full" at DV across primaries.
      const avgPct = primary.reduce(
        (sum, id) => sum + Math.min(pctOfDV(id, totals), 100),
        0
      ) / primary.length;
      const fillWidth = avgPct; // 0–100, no overflow possible
      const color = colorForPct(avgPct, null);

      const row = document.createElement('div');
      row.className = 'bar-row';

      const spacer = document.createElement('div');
      const label = document.createElement('div');
      label.className = 'bar-label';
      label.textContent = cluster.label;

      const track = document.createElement('div');
      track.className = 'bar-track';
      const fill = document.createElement('div');
      fill.className = 'bar-fill';
      fill.style.width = fillWidth + '%';
      fill.style.background = color;
      track.appendChild(fill);
      // No DV/UL ticks for cluster bars — full bar = cluster fully covered.

      const pctEl = document.createElement('div');
      pctEl.className = 'bar-pct';
      pctEl.textContent = Math.round(avgPct) + '%';

      row.appendChild(spacer);
      row.appendChild(label);
      row.appendChild(track);
      row.appendChild(pctEl);
      container.appendChild(row);
    });
  }

  // ============================================================
  //  EVENTS
  // ============================================================

  document.querySelectorAll('#view-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      state.view = btn.dataset.view;
      saveState();
      renderViewToggle();
      renderBars();
    });
  });

  // ============================================================
  //  GO
  // ============================================================
  render();
  </script>
</body>
</html>
